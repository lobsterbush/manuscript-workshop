<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Workshop Slides</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image:
        linear-gradient(rgba(0, 109, 174, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 109, 174, 0.03) 1px, transparent 1px),
        linear-gradient(rgba(0, 109, 174, 0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 109, 174, 0.015) 1px, transparent 1px);
      background-size: 100px 100px, 100px 100px, 20px 20px, 20px 20px;
      pointer-events: none;
      z-index: 0;
    }
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 440px;
      width: 90%;
    }
    h1 {
      font-size: 1.8em;
      font-weight: 600;
      margin-bottom: 0.3em;
    }
    .subtitle {
      color: #6a6a6a;
      font-size: 0.95em;
      margin-bottom: 2em;
    }
    form {
      display: flex;
      gap: 0.6em;
    }
    input[type="password"] {
      flex: 1;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 1em;
      padding: 0.7em 1em;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus {
      border-color: #006DAE;
    }
    button {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 1em;
      font-weight: 500;
      padding: 0.7em 1.5em;
      background: #006DAE;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #005a91; }
    .error {
      color: #e85555;
      font-size: 0.9em;
      margin-top: 1em;
      min-height: 1.4em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Preparing Manuscripts<br>for Journals</h1>
    <p class="subtitle">Enter the workshop password to view slides.</p>
    <form id="gate">
      <input type="password" id="pw" placeholder="Password" autofocus>
      <button type="submit">Enter</button>
    </form>
    <p class="error" id="err"></p>
  </div>
  <script>
    document.getElementById('gate').addEventListener('submit', async function(e) {
      e.preventDefault();
      var pw = document.getElementById('pw').value;
      var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
      var hash = Array.from(new Uint8Array(buf)).map(function(b) { return b.toString(16).padStart(2, '0'); }).join('').slice(0, 16);
      var url = hash + '.html';
      var resp = await fetch(url, { method: 'HEAD' });
      if (resp.ok) {
        window.location.href = url;
      } else {
        document.getElementById('err').textContent = 'Incorrect password.';
        document.getElementById('pw').value = '';
        document.getElementById('pw').focus();
      }
    });
  </script>
</body>
</html>
